name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - run: pip install -e ".[dev,yaml,sinks,cli]"
      - run: pytest tests/ -v

  quality:
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -e ".[dev,yaml,sinks,cli]" mypy "ruff==0.15.5"
      - name: Lint
        run: ruff check src/ tests/
      - name: Format check
        run: ruff format --check src/ tests/
      - name: Type check (informational)
        run: mypy src/edictum/ --ignore-missing-imports
        continue-on-error: true

  security:
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -e ".[dev,yaml,sinks,cli]" bandit pip-audit
      - name: Security lint (bandit)
        run: bandit -r src/ -ll -ii
      - name: Audit Python dependencies
        # CVE-2026-4539: pygments 2.19.2 — no upstream fix available yet (latest on PyPI).
        # Transitive dep from pdoc, pytest, rich. Remove ignore when patched version ships.
        # CVE-2026-3219: pip 26.0.1 — no upstream fix available yet (latest on PyPI).
        # Installed by the CI Python toolchain. Remove ignore when patched version ships.
        run: pip-audit --ignore-vuln CVE-2026-4539 --ignore-vuln CVE-2026-3219
      - name: Security boundary tests
        run: pytest -m security -v --tb=short
